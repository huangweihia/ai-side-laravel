version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ai_side_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ai_side
      MYSQL_USER: ai_side
      MYSQL_PASSWORD: aiside123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai_side_network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai_side_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_side_network
    restart: unless-stopped

  # PHP + Laravel 应用
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ai_side_php
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:80"
    environment:
      APP_URL: http://localhost:8080
      APP_DEBUG: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ai_side
      DB_USERNAME: ai_side
      DB_PASSWORD: aiside123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - ai_side_network
    restart: unless-stopped

  # Nginx Web 服务器
  nginx:
    image: nginx:alpine
    container_name: ai_side_nginx
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    depends_on:
      - php
    networks:
      - ai_side_network
    restart: unless-stopped

  # Laravel Queue Worker
  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ai_side_worker
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - mysql
      - redis
    networks:
      - ai_side_network
    restart: unless-stopped

  # Laravel Scheduler
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ai_side_scheduler
    volumes:
      - ./:/var/www/html
    command: php artisan schedule:work
    depends_on:
      - mysql
      - redis
    networks:
      - ai_side_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  ai_side_network:
    driver: bridge
